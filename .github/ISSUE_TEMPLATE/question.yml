name: Question
description: Ask a question about Snapflow Database usage or implementation
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How can I perform a LEFT JOIN with multiple WHERE conditions?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context about what you're trying to achieve.
      placeholder: I'm building an application that needs to query users with their posts, filtering by post status...
    validations:
      required: false

  - type: textarea
    id: attempted
    attributes:
      label: What Have You Tried?
      description: Share any code or approaches you've already attempted.
      placeholder: |
        ```php
        <?php

        use Snapflow\Database\Database;

        $db = new Database([...]);

        // I tried doing this but I'm not sure if it's correct
        $result = $db->select('users', [
            '[>]posts' => ['id' => 'user_id']
        ], [
            'users.name',
            'posts.title'
        ], [
            'posts.status' => 'published'
        ]);
        ```
      render: php
    validations:
      required: false

  - type: dropdown
    id: topic
    attributes:
      label: Question Topic
      description: What area is your question about?
      options:
        - "SELECT/Query Building"
        - "INSERT/UPDATE/DELETE"
        - "Joins"
        - "Transactions"
        - "Raw SQL"
        - "Database Connection"
        - "Performance/Optimization"
        - "PostgreSQL-specific Features"
        - "General Usage"
        - "Other"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Library Version
      description: Which version are you using? (optional)
      placeholder: v1.0.0, main, etc.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be helpful (database schema, expected output, etc.)
      placeholder: |
        My database schema:
        ```sql
        CREATE TABLE users (
            id SERIAL PRIMARY KEY,
            name VARCHAR(100)
        );
        ```
    validations:
      required: false
