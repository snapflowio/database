name: Feature Request
description: Suggest a new feature or enhancement for Snapflow Database
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm frustrated when I need to perform batch upserts but there's no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: Add a $db->upsert() method that allows inserting or updating based on conflict...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: I tried using raw SQL with Database::raw() but it's not ideal for...
    validations:
      required: false

  - type: textarea
    id: example
    attributes:
      label: Example Usage
      description: Show how you would like to use this feature with example code.
      placeholder: |
        ```php
        <?php

        use Snapflow\Database\Database;

        $db = new Database([...]);

        // Example of desired API
        $db->upsert('users', [
            'email' => 'john@example.com',
            'name' => 'John Doe'
        ], [
            'conflict' => 'email',
            'update' => ['name']
        ]);
        ```
      render: php
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: Breaking Change
      description: Would this feature require breaking changes to the API?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Feature Scope
      description: What area does this feature affect?
      options:
        - "Query Building"
        - "PostgreSQL Adapter"
        - "Data Mapping"
        - "Transactions"
        - "Performance"
        - "Developer Experience"
        - "Other"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to help implement this feature?
      options:
        - label: I'm willing to submit a PR for this feature
          required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, SQL examples, or benchmarks about the feature request.
      placeholder: |
        PostgreSQL documentation reference: https://...

        Similar feature in other libraries: ...
    validations:
      required: false
