name: Documentation Improvement
description: Suggest improvements to documentation
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve our documentation!

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Type
      description: What type of documentation needs improvement?
      options:
        - README
        - API/godoc comments
        - Examples
        - Tutorial/Guide
        - Other
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Location
      description: Where is the documentation that needs improvement?
      placeholder: |
        File: README.md
        Section: Installation
        Line: 45-50
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What's Wrong or Missing?
      description: Describe the issue with the current documentation
      placeholder: The documentation is unclear about...
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
      placeholder: It should explain...

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context or examples
      placeholder: Add any other context here
